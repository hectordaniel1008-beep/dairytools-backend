services:
  - type: web
    name: dairytools-backend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      # Las siguientes las configuras manualmente en el dashboard de Render:
      # DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASS
      # JWT_ACCESS_SECRET, JWT_REFRESH_SECRET
      # JWT_ACCESS_EXPIRES, JWT_REFRESH_EXPIRES
      # FRONTEND_URL
